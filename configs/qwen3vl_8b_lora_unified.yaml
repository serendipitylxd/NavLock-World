model_name_or_path: models/Qwen3-VL-8B-Instruct
train_file: outputs/vlm_semantic/qwen3vl_4b/navlock_qwen3vl_4b_train_gate_hardmix.jsonl
eval_file: outputs/vlm_semantic/qwen3vl_4b/navlock_qwen3vl_4b_val.jsonl
output_dir: outputs/qwen3vl_8b_lora_unified

max_samples: 200
max_eval_samples: 3
max_images_per_sample: 4
max_text_chars: 6000
max_steps: 4
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 0.000001
warmup_steps: 0
weight_decay: 0.0
max_grad_norm: 0.3
optim: paged_adamw_8bit
lr_scheduler_type: constant
adam_epsilon: 0.000001
logging_steps: 5
eval_steps: 8
save_steps: 8
save_total_limit: 1
overwrite_output_dir: true
seed: 42
logging_nan_inf_filter: false
skip_memory_metrics: true

use_4bit: true
bnb_4bit_quant_type: nf4
bnb_4bit_compute_dtype: float32
kbit_prepare_mode: no_fp32_cast
bf16: false
fp16: false
gradient_checkpointing: true

lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
